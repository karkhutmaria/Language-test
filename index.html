<!DOCTYPE html>
<html>
<head>
    <title>Мой jsPsych тест с таймером</title>
    <!-- Подключаем jsPsych из CDN -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <!-- Подключаем стандартные плагины -->
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.3"></script>
    <!-- Подключаем CSS стили -->
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        .results-table {
            margin-top: 20px;
            border-collapse: collapse;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
        }
        .results-table th, .results-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .results-table th {
            background-color: #f2f2f2;
        }
        h2 {
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="jspsych-target"></div>

    <script>
        // ---------- 1. Массив из 10 вопросов ----------
        const questions = [
            {
                stimulus: `<h2>1. Выберите недостающее слово: десятинный/ая/ое _______</h2>`,
                choices: ['Собор', 'Храм', 'Церковь', 'Монастырь'],
                correct: 'Церковь'
            },
            {
                stimulus: `<h2>2. Выберите недостающее слово: посильный/ая/ое _______</h2>`,
                choices: ['Помощь', 'Союз', 'Защита', 'Забота'],
                correct: 'Помощь'
            },
            {
                stimulus: `<h2>3. Выберите недостающее слово:<br>несбыточный/ая/ое _______</h2>`,
                choices: ['Цель', 'Надежда', 'Вера', 'Мечта'],
                correct: 'Мечта'
            },
            {
                stimulus: `<h2>4. Выберите недостающее слово:<br>праздничный/ая/ое _______</h2>`,
                choices: ['Кровать', 'Диван', 'Стул', 'Стол'],
                correct: 'Стол'
            },
            {
                stimulus: `<h2>5. Выберите недостающее слово:<br>бальный/ая/ое _______</h2>`,
                choices: ['Костюм', 'Платье', 'Пальто', 'Штаны'],
                correct: 'Платье'
            },
            {
                stimulus: `<h2>6. Выберите слово, соответсвуюющее следующему определению:<br>"Одна из двух верхних конечностей человека, от плеча до конца пальцев"</h2>`,
                choices: ['Нога', 'Рука', 'Голова', 'Глаз'],
                correct: 'Рука'
            },
            {
                stimulus: `<h2>7. Выберите слово, соответсвуюющее следующему определению:<br>"Чувство удовольствия, внутреннего удовлетворения, веселое настроение"</h2>`,
                choices: ['Любовь', 'Страсть', 'Радость', 'Восторг'],
                correct: 'Радость'
            },
            {
                stimulus: `<h2>8. Выберите слово, соответсвуюющее следующему определению:<br>"Умственный расчет, предположение, соображение"</h2>`,
                choices: ['Мысль', 'Идея', 'Мнение', 'Знание'],
                correct: 'Мысль'
            },
            {
                stimulus: `<h2>9. Выберите слово, соответсвуюющее следующему определению:<br>"Многолетнее растение с твердым стволом и ветвями, образующими крону"</h2>`,
                choices: ['Цветок', 'Трава', 'Куст', 'Дерево'],
                correct: 'Дерево'
            },
            {
                stimulus: `<h2>10. Выберите слово, соответсвуюющее следующему определению:<br>"Бестолковая беготня, торопливость в хлопотах, заботах, сборах, работе и т.п."</h2>`,
                choices: ['Безумие', 'Шалость', 'Суета', 'Буйство'],
                correct: 'Суета'
            }
        ];

        // ---------- 2. Определяем функцию отправки данных в Google Sheets через SheetDB (обновлена) ----------
        function sendDataToSheet(experimentData) {
            // Получаем все данные по вопросам (trial_id начинается с 'question_')
            const allQuestions = experimentData.filter({trial_id: /question_\d+/}).values();
            console.log("Отправляем данные:", allQuestions);

            if (allQuestions.length === 0) return;

            // Формируем массив строк для отправки (одна строка на вопрос)
            const rowsToSend = allQuestions.map(trial => ({
                question: trial.question_text,
                response: trial.response,
                rt: trial.rt,
                correct: trial.correct ? "Да" : "Нет",
                timestamp: new Date().toISOString()
            }));

            fetch('https://sheetdb.io/api/v1/67o9oqw8o6f3v', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ data: rowsToSend })
            })
            .then(response => response.json())
            .then(data => console.log('Успешно отправлено:', data))
            .catch(error => console.error('Ошибка отправки:', error));
        }

        // Инициализируем jsPsych
        var jsPsych = initJsPsych({
            display_element: 'jspsych-target',
            on_finish: function() {
                // Получаем все данные
                var experimentData = jsPsych.data.get();

                // Показываем данные в консоли
                console.log("Результаты эксперимента:", experimentData.json());

                // ---- Отображение таблицы результатов (новая часть) ----
                const questionTrials = experimentData.filter({trial_id: /question_\d+/}).values();
                if (questionTrials.length > 0) {
                    let html = '<h2>Результаты теста</h2>';
                    html += '<table class="results-table">';
                    html += '<tr><th>Вопрос</th><th>Ваш ответ</th><th>Время реакции (мс)</th><th>Правильно</th></tr>';
                    questionTrials.forEach(trial => {
                        html += `<tr>
                                    <td>${trial.question_text}</td>
                                    <td>${trial.response || "(нет ответа)"}</td>
                                    <td>${Math.round(trial.rt)}</td>
                                    <td>${trial.correct ? "✅ Да" : "❌ Нет"}</td>
                                 </tr>`;
                    });
                    html += '</table>';
                    document.body.innerHTML += html;
                }

                // Отправляем данные в Google Sheets
                sendDataToSheet(experimentData);
            }
        });

        // 1. Экран приветствия
        var welcome = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <h1>Добро пожаловать!</h1>
                <p>Вам будет предложено 10 вопросов</p>
                <p>Нажмите пробел, чтобы начать.</p>
            `,
            choices: [' ']
        };

        // 2. Генерация 10 вопросов с помощью цикла (сохраняем стиль original)
        var questionTrials = [];
        for (let i = 0; i < questions.length; i++) {
            const q = questions[i];
            questionTrials.push({
                type: jsPsychHtmlButtonResponse,
                stimulus: q.stimulus,
                choices: q.choices,
                button_html: '<button class="jspsych-btn" style="margin:10px; padding:10px 20px;">%choice%</button>',
                data: {
                    trial_id: `question_${i+1}`,
                    question_text: q.stimulus.replace(/<[^>]*>/g, '').replace(/\d+\.\s*/, ''), // очищаем HTML для сохранения текста
                    correct_answer: q.correct
                },
                on_finish: function(data) {
                    // data.response – это текст выбранной кнопки
                    data.correct = (data.response === data.correct_answer);
                }
            });
        }

        // 3. Экран благодарности
        var thanks = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <h1>Спасибо за участие!</h1>
                <p>Ваши данные сохранены.</p>
                <p>Результаты появятся ниже.</p>
            `,
            choices: [' '],
            trial_duration: 3000
        };

        // Запускаем тест: приветствие → 10 вопросов → благодарность
        jsPsych.run([welcome, ...questionTrials, thanks]);
    </script>
</body>
</html>
