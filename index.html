<!DOCTYPE html>
<html>
<head>
    <title>Тест с 10 вопросами</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        #results {
            margin: 20px;
            padding: 10px;
            border-top: 2px solid #ccc;
        }
        .result-item {
            margin-bottom: 15px;
            padding: 10px;
            background: #f9f9f9;
            border-left: 4px solid #4caf50;
        }
    </style>
</head>
<body>
<div id="jspsych-target"></div>
<div id="results"></div>

<script>
    const questions = [
        { text: "1. Выберите недостающее слово: десятинный/ая _______", choices: ['Собор', 'Храм', 'Церковь', 'Монастырь'] },
        { text: "2. Выберите недостающее слово: посильный/ая/ое _______", choices: ['Помощь', 'Союз', 'Защита', 'Забота'] },
        { text: "3. Выберите недостающее слово:<br>несбыточный/ая/ое _______", choices: ['Цель', 'Надежда', 'Вера', 'Мечта'] },
        { text: "4. Выберите недостающее слово:<br>праздничный/ая/ое _______", choices: ['Кровать', 'Диван', 'Стул', 'Стол'] },
        { text: "5. Выберите недостающее слово:<br>бальный/ая/ое _______", choices: ['Костюм', 'Платье', 'Пальто', 'Штаны'] },
        { text: "6. Выберите слово, соответствующее определению:<br>\"Одна из двух верхних конечностей человека, от плеча до конца пальцев\"", choices: ['Нога', 'Рука', 'Голова', 'Глаз'] },
        { text: "7. Выберите слово, соответствующее определению:<br>\"Чувство удовольствия, внутреннего удовлетворения, веселое настроение\"", choices: ['Любовь', 'Страсть', 'Радость', 'Восторг'] },
        { text: "8. Выберите слово, соответствующее определению:<br>\"Умственный расчет, предположение, соображение\"", choices: ['Мысль', 'Идея', 'Мнение', 'Знание'] },
        { text: "9. Выберите слово, соответствующее определению:<br>\"Многолетнее растение с твердым стволом и ветвями, образующими крону\"", choices: ['Цветок', 'Трава', 'Куст', 'Дерево'] },
        { text: "10. Выберите слово, соответствующее определению:<br>\"Бестолковая беготня, торопливость в хлопотах, заботах, сборах, работе и т.п.\"", choices: ['Безумие', 'Шалость', 'Суета', 'Буйство'] }
    ];

    const jsPsych = initJsPsych({
        display_element: 'jspsych-target',
        on_finish: function() {
            const allData = jsPsych.data.get().values();
            const questionData = allData.filter(t => t.trial_id && t.trial_id.startsWith('question_'));
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<h2>Ваши ответы</h2>';
            questionData.forEach(trial => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <p><strong>${trial.question_text}</strong></p>
                    <p>Выбрано слово: <strong>${trial.response}</strong></p>
                    <p>Время реакции: ${Math.round(trial.rt)} мс</p>
                `;
                resultsDiv.appendChild(item);
            });
        }
    });

    const welcome = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: `
            <h1>Добро пожаловать!</h1>
            <p>Вам будет предложено 10 вопросов</p>
            <p>Нажмите пробел или нажмите кнопку ниже, чтобы начать</p>
            <button id="start-button" class="jspsych-btn" style="margin-top:20px;">Начать</button>
        `,
        choices: [' '],
        on_load: function(trial) {
            const startButton = document.getElementById('start-button');
            if (startButton) {
                startButton.addEventListener('click', function() {
                    jsPsych.finishTrial({response: ' '});
                });
            }
        }
    };


    const questionTrials = [];
    for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        const plainText = q.text.replace(/<[^>]*>/g, '').replace(/^\d+\.\s*/, '');
        (function(choicesArray, promptText, plain) {
            questionTrials.push({
                type: jsPsychHtmlButtonResponse,
                stimulus: `<h2>${promptText}</h2>`,
                choices: choicesArray,
                button_html: '<button class="jspsych-btn" style="margin:10px; padding:10px 20px;">%choice%</button>',
                data: {
                    trial_id: `question_${i+1}`,
                    question_text: plain
                },
                on_finish: function(data) {
                    // data.response is the index (0..n-1); we replace it with the actual word
                    const selectedWord = choicesArray[data.response];
                    data.response = selectedWord;
                }
            });
        })(q.choices, q.text, plainText);
    }

    const thanks = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<h1>Спасибо за участие!</h1><p>Ваши ответы появятся ниже.</p>',
        choices: [' '],
        trial_duration: 3000
    };

    jsPsych.run([welcome, ...questionTrials, thanks]);
</script>
</body>
</html>
