<!DOCTYPE html>
<html>
<head>
    <title>Тест на время реакции</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        .results-table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
            font-family: sans-serif;
        }
        .results-table th, .results-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .results-table th {
            background-color: #f2f2f2;
        }
        .correct {
            color: green;
            font-weight: bold;
        }
        .incorrect {
            color: red;
            font-weight: bold;
        }
        .thanks-message {
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>
<body>
<div id="jspsych-target"></div>

<script>
    // Массив из 10 вопросов
    const questions = [
        { stimulus: `<h2>1. Выберите недостающее слово: десятинный/ая/ое _______</h2>`, choices: ['Собор', 'Храм', 'Церковь', 'Монастырь'], correct: 'Церковь' },
        { stimulus: `<h2>2. Выберите недостающее слово: посильный/ая/ое _______</h2>`, choices: ['Помощь', 'Союз', 'Защита', 'Забота'], correct: 'Помощь' },
        { stimulus: `<h2>3. Выберите недостающее слово:<br>несбыточный/ая/ое _______</h2>`, choices: ['Цель', 'Надежда', 'Вера', 'Мечта'], correct: 'Мечта' },
        { stimulus: `<h2>4. Выберите недостающее слово:<br>праздничный/ая/ое _______</h2>`, choices: ['Кровать', 'Диван', 'Стул', 'Стол'], correct: 'Стол' },
        { stimulus: `<h2>5. Выберите недостающее слово:<br>бальный/ая/ое _______</h2>`, choices: ['Костюм', 'Платье', 'Пальто', 'Штаны'], correct: 'Платье' },
        { stimulus: `<h2>6. Выберите слово, соответсвуюющее следующему определению:<br>"Одна из двух верхних конечностей человека, от плеча до конца пальцев"</h2>`, choices: ['Нога', 'Рука', 'Голова', 'Глаз'], correct: 'Рука' },
        { stimulus: `<h2>7. Выберите слово, соответсвуюющее следующему определению:<br>"Чувство удовольствия, внутреннего удовлетворения, веселое настроение"</h2>`, choices: ['Любовь', 'Страсть', 'Радость', 'Восторг'], correct: 'Радость' },
        { stimulus: `<h2>8. Выберите слово, соответсвуюющее следующему определению:<br>"Умственный расчет, предположение, соображение"</h2>`, choices: ['Мысль', 'Идея', 'Мнение', 'Знание'], correct: 'Мысль' },
        { stimulus: `<h2>9. Выберите слово, соответсвуюющее следующему определению:<br>"Многолетнее растение с твердым стволом и ветвями, образующими крону"</h2>`, choices: ['Цветок', 'Трава', 'Куст', 'Дерево'], correct: 'Дерево' },
        { stimulus: `<h2>10. Выберите слово, соответсвуюющее следующему определению:<br>"Бестолковая беготня, торопливость в хлопотах, заботах, сборах, работе и т.п."</h2>`, choices: ['Безумие', 'Шалость', 'Суета', 'Буйство'], correct: 'Суета' }
    ];

    // Инициализируем jsPsych (без on_finish, потому что результаты будут показаны в последнем испытании)
    var jsPsych = initJsPsych({
        display_element: 'jspsych-target'
    });

    // Функция для построения HTML с результатами
    function buildResultsHTML() {
        var data = jsPsych.data.get().values();
        var questionData = data.filter(trial => trial.trial_id && trial.trial_id.startsWith('question_'));
        
        var html = '<div class="thanks-message"><h1>Спасибо за участие!</h1></div>';
        html += '<h2 style="text-align:center;">Ваши результаты</h2>';
        html += '<table class="results-table">';
        html += '<tr><th>Вопрос</th><th>Ваш ответ</th><th>Время реакции (мс)</th><th>Правильно</th></tr>';
        
        questionData.forEach(trial => {
            var correctClass = trial.correct ? 'correct' : 'incorrect';
            var correctText = trial.correct ? 'Да' : 'Нет';
            html += `<tr>
                        <td>${trial.question_text}</td>
                        <td>${trial.response || '(нет ответа)'}</td>
                        <td>${Math.round(trial.rt)}</td>
                        <td class="${correctClass}">${correctText}</td>
                     </tr>`;
        });
        html += '</table>';
        return html;
    }

    // Приветствие
    var welcome = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<h1>Добро пожаловать!</h1><p>Вам будет предложено 10 вопросов.</p><p>Нажмите пробел, чтобы начать.</p>',
        choices: [' ']
    };

    // Создание вопросов
    var questionTrials = [];
    for (var i = 0; i < questions.length; i++) {
        var q = questions[i];
        var plainText = q.stimulus.replace(/<[^>]*>/g, '').replace(/^\d+\.\s*/, '');
        questionTrials.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: q.stimulus,
            choices: q.choices,
            button_html: '<button class="jspsych-btn" style="margin:10px; padding:10px 20px;">%choice%</button>',
            data: {
                trial_id: 'question_' + (i+1),
                question_text: plainText,
                correct_answer: q.correct
            },
            on_finish: function(data) {
                data.correct = (data.response === data.correct_answer);
            }
        });
    }

    // Финальное испытание: спасибо и результаты
    var finalScreen = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function() {
            return buildResultsHTML();
        },
        choices: [' '],  // или любой другой способ завершить, например, можно дать кнопку
        trial_duration: null  // показываем, пока пользователь не нажмёт пробел
    };

    // Запуск: приветствие → 10 вопросов → финальный экран с результатами
    jsPsych.run([welcome, ...questionTrials, finalScreen]);
</script>
</body>
</html>
