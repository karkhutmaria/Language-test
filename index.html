<!DOCTYPE html>
<html>
<head>
    <title>Мой jsPsych тест с таймером</title>
    <!-- Подключаем jsPsych из CDN -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <!-- Подключаем стандартные плагины -->
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <!-- Подключаем CSS стили -->
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <div id="jspsych-target"></div>

    <script>
        // Определяем функцию отправки данных в Google Sheets через SheetDB
        function sendDataToSheet(experimentData) {
            // Получаем все данные эксперимента
            var allData = experimentData.json();
            console.log("Отправляем данные:", allData);
            
            // Отправляем только нужные данные (например, ответ на тестовый вопрос)
            var testData = experimentData.filter({trial_id: 'test_question'}).values()[0];
            
            if (testData) {
                fetch('https://sheetdb.io/api/v1/67o9oqw8o6f3v', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        data: [{ 
                            response: testData.response, 
                            rt: testData.rt, 
                            correct: testData.correct,
                            timestamp: new Date().toISOString()
                        }] 
                    })
                })
                .then(response => response.json())
                .then(data => console.log('Успешно отправлено:', data))
                .catch(error => console.error('Ошибка отправки:', error));
            }
        }

        // Инициализируем jsPsych
        var jsPsych = initJsPsych({
            display_element: 'jspsych-target',
            on_finish: function() {
                // Когда тест закончен, получаем все данные
                var experimentData = jsPsych.data.get();
                
                // Показываем данные в консоли
                console.log("Результаты эксперимента:", experimentData.json());
                
                // Показываем данные на экране
                var testData = experimentData.filter({trial_id: 'test_question'}).values()[0];
                if (testData) {
                    document.body.innerHTML += '<h2>Результаты:</h2>' +
                        '<p>Ответ: ' + testData.response + '</p>' +
                        '<p>Время реакции: ' + testData.rt + ' мс</p>' +
                        '<p>Правильно: ' + (testData.correct ? 'Да' : 'Нет') + '</p>';
                }
                
                // Отправляем данные в Google Sheets
                sendDataToSheet(experimentData);
            }
        });

        // 1. Экран приветствия
        var welcome = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <h1>Добро пожаловать!</h1>
                <p>Сейчас появится вопрос.</p>
                <p>Нажмите пробел, чтобы начать.</p>
            `,
            choices: [' ']
        };

        // 2. Тестовый вопрос с картинкой
        var test_question = {
            type: jsPsychHtmlButtonResponse,
            stimulus: `
                <h2>Выберите недостающее слово: десятинный/ая _______</h2>
            `,
            choices: ['Собор', 'Храм', 'Церковь', 'Монастырь'],
            button_html: '<button class="jspsych-btn" style="margin:10px; padding:10px 20px;">%choice%</button>',
            data: {
                trial_id: 'test_question',
                correct_answer: 'Церковь'
            },
            on_finish: function(data) {
                data.correct = data.response === 'Церковь';
            }
        };

        // 3. Экран благодарности
        var thanks = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <h1>Спасибо за участие!</h1>
                <p>Ваши данные сохранены.</p>
            `,
            choices: [' '],
            trial_duration: 3000
        };

        // Запускаем тест
        jsPsych.run([welcome, test_question, thanks]);
    </script>
</body>
</html>
